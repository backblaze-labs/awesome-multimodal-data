# Source of truth for this list. Hand-edit this file only — README.md and
# llms.txt are regenerated by ~/awesome-lists/scripts/generate.py.

# ---------------- Image-Text Datasets ----------------

- name: LAION-5B
  url: https://laion.ai/blog/laion-5b/
  docs_url: https://huggingface.co/datasets/laion/laion2B-en
  description: 5.85B image-text pairs scraped from Common Crawl. Foundation dataset for Stable Diffusion and many open CLIP models.
  category: image-text-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: DataComp
  url: https://www.datacomp.ai
  docs_url: https://github.com/mlfoundations/datacomp
  description: Benchmark and toolkit for building image-text datasets. DataComp-1B is the reference filtered training set.
  category: image-text-datasets
  github: mlfoundations/datacomp
  license: MIT
  b2_integration: ""
  last_verified: 2026-04-17

- name: COYO-700M
  url: https://github.com/kakaobrain/coyo-dataset
  description: 747M curated image-alt-text pairs from Kakao Brain. Alternative to LAION for pretraining multimodal models.
  category: image-text-datasets
  github: kakaobrain/coyo-dataset
  b2_integration: ""
  last_verified: 2026-04-17

- name: PixelProse / Docmatix
  url: https://huggingface.co/datasets/HuggingFaceM4/Docmatix
  description: Large-scale document-image instruction dataset from HuggingFace. Useful for training multimodal document-QA models.
  category: image-text-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Conceptual Captions 12M
  url: https://github.com/google-research-datasets/conceptual-12m
  description: 12M image-text pairs from Google, harvested from alt-text with automated cleaning. Widely used as a CLIP baseline.
  category: image-text-datasets
  github: google-research-datasets/conceptual-12m
  b2_integration: ""
  last_verified: 2026-04-17

# ---------------- Video Datasets ----------------

- name: Ego4D
  url: https://ego4d-data.org
  docs_url: https://ego4d-data.org/docs/
  description: 3,670 hours of first-person video from 931 participants across 9 countries. Benchmarks for social, hands, memory, forecasting.
  category: video-datasets
  github: facebookresearch/Ego4d
  b2_integration: ""
  last_verified: 2026-04-17

- name: HowTo100M
  url: https://www.di.ens.fr/willow/research/howto100m/
  docs_url: https://github.com/antoine77340/howto100m
  description: 136M narrated instructional video clips from 1.22M YouTube videos. A staple for video-language pretraining.
  category: video-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: WebVid-10M
  url: https://github.com/m-bain/webvid
  description: 10M weakly-captioned web videos. Common pretraining corpus for text-to-video and video-language models.
  category: video-datasets
  github: m-bain/webvid
  b2_integration: ""
  last_verified: 2026-04-17

- name: InternVid
  url: https://huggingface.co/datasets/OpenGVLab/InternVid
  docs_url: https://github.com/OpenGVLab/InternVideo
  description: 7M videos (~234M clips) with rich captions. Part of the InternVideo foundation-model release.
  category: video-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Panda-70M
  url: https://snap-research.github.io/Panda-70M/
  docs_url: https://github.com/snap-research/Panda-70M
  description: 70M high-quality short video clips with automatically generated captions. Used in several video LLM pretraining runs.
  category: video-datasets
  github: snap-research/Panda-70M
  b2_integration: ""
  last_verified: 2026-04-17

- name: OpenVid-1M
  url: https://huggingface.co/datasets/nkp37/OpenVid-1M
  docs_url: https://github.com/NJU-PCALab/OpenVid-1M
  description: 1M curated text-video pairs with aesthetic/motion/consistency scores. Includes OpenVidHD-0.4M subset at 1080p. ICLR 2025.
  category: video-datasets
  github: NJU-PCALab/OpenVid-1M
  license: CC-BY-4.0
  b2_integration: ""
  last_verified: 2026-04-18

# ---------------- Audio and Speech Datasets ----------------

- name: LibriSpeech
  url: https://www.openslr.org/12
  description: 1,000-hour English speech corpus derived from LibriVox. The long-running default ASR benchmark.
  category: audio-and-speech-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Mozilla Common Voice
  url: https://commonvoice.mozilla.org
  docs_url: https://commonvoice.mozilla.org/en/datasets
  description: Open speech corpus built from community contributions. 100+ languages and growing.
  category: audio-and-speech-datasets
  github: common-voice/common-voice
  license: CC0-1.0
  b2_integration: ""
  last_verified: 2026-04-17

- name: AudioSet
  url: https://research.google.com/audioset/
  description: Google's 2M+ human-labelled 10-second sound clips across 632 classes. Standard corpus for sound-event classification.
  category: audio-and-speech-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Emilia
  url: https://huggingface.co/datasets/amphion/Emilia-Dataset
  docs_url: https://github.com/open-mmlab/Amphion
  description: 100k+ hours of multilingual, in-the-wild speech data from the Amphion team. Backbone for modern open TTS training.
  category: audio-and-speech-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: WavCaps
  url: https://huggingface.co/datasets/cvssp/WavCaps
  docs_url: https://github.com/XinhaoMei/WavCaps
  description: 400k weakly-labelled audio clips with ChatGPT-generated captions from FreeSound, BBC Sound Effects, and AudioSet. Academic use only.
  category: audio-and-speech-datasets
  github: XinhaoMei/WavCaps
  b2_integration: ""
  last_verified: 2026-04-18

# ---------------- Document and Text Datasets ----------------

- name: FineWeb / FineWeb-Edu
  url: https://huggingface.co/datasets/HuggingFaceFW/fineweb
  docs_url: https://huggingface.co/blog/fineweb
  description: 15T high-quality English tokens filtered from 96 Common Crawl dumps. Edu variant is ~1.3T educational-content tokens.
  category: document-and-text-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: The Stack v2
  url: https://huggingface.co/datasets/bigcode/the-stack-v2
  docs_url: https://huggingface.co/blog/bigcode-the-stack
  description: 3TB of permissively licensed source code across 600+ programming languages. Training data for StarCoder/StarCoder2.
  category: document-and-text-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Common Corpus
  url: https://huggingface.co/blog/Pclanglais/common-corpus
  docs_url: https://huggingface.co/collections/PleIAs/common-corpus-65d46e3ea3980fdcd66a5613
  description: 2T-token fully open text corpus from PleIAs. Public-domain and permissive text only — usable for commercial training.
  category: document-and-text-datasets
  b2_integration: ""
  last_verified: 2026-04-17

- name: Dolma
  url: https://github.com/allenai/dolma
  description: AI2's 3T-token open pretraining corpus with a transparent pipeline. Backbone for OLMo training.
  category: document-and-text-datasets
  github: allenai/dolma
  license: Apache-2.0
  b2_integration: ""
  last_verified: 2026-04-17

- name: DCLM-Baseline
  url: https://huggingface.co/datasets/mlfoundations/dclm-baseline-1.0
  docs_url: https://github.com/mlfoundations/dclm
  description: 4T-token filtered web corpus from 240T-token Common Crawl pool. Trains 7B models to 64% MMLU at 2.6T tokens. NeurIPS 2024.
  category: document-and-text-datasets
  github: mlfoundations/dclm
  license: CC-BY-4.0
  b2_integration: ""
  last_verified: 2026-04-18

# ---------------- Data Loading and Streaming ----------------

- name: WebDataset
  url: https://github.com/webdataset/webdataset
  docs_url: https://webdataset.github.io/webdataset/
  description: PyTorch dataset format packaging samples as tar shards. Streams directly from S3-compatible object storage.
  category: data-loading-and-streaming
  github: webdataset/webdataset
  license: BSD-3-Clause
  sdks:
    - {language: Python (pip install webdataset)}
  b2_integration: ""
  last_verified: 2026-04-17

- name: MosaicML Streaming
  url: https://docs.mosaicml.com/projects/streaming/en/stable/
  docs_url: https://github.com/mosaicml/streaming
  description: "Deterministic, shuffled, resumable streaming of datasets from cloud storage. Shard format: MDS."
  category: data-loading-and-streaming
  github: mosaicml/streaming
  license: Apache-2.0
  sdks:
    - {language: Python (pip install mosaicml-streaming)}
  b2_integration: ""
  last_verified: 2026-04-17

- name: HuggingFace Datasets
  url: https://huggingface.co/docs/datasets
  docs_url: https://github.com/huggingface/datasets
  description: Unified loading, streaming, and processing of thousands of datasets. Native Arrow/Parquet with memory-mapped access.
  category: data-loading-and-streaming
  github: huggingface/datasets
  license: Apache-2.0
  sdks:
    - {language: Python (pip install datasets)}
  b2_integration: ""
  last_verified: 2026-04-17

- name: Ray Data
  url: https://docs.ray.io/en/latest/data/data.html
  description: Distributed data loading and preprocessing inside Ray. Native connectors for Parquet on S3-compatible stores.
  category: data-loading-and-streaming
  sdks:
    - {language: "Python (pip install 'ray[data]')"}
  b2_integration: ""
  last_verified: 2026-04-17

- name: Lance
  url: https://lancedb.github.io/lance/
  docs_url: https://github.com/lancedb/lance
  description: Columnar format designed for ML. 100x faster random access than Parquet, versioned, zero-copy from object storage.
  category: data-loading-and-streaming
  github: lancedb/lance
  license: Apache-2.0
  sdks:
    - {language: Python (pip install pylance)}
    - {language: Rust}
  b2_integration: ""
  last_verified: 2026-04-17

