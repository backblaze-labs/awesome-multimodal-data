# ---------------- Embedding and Indexing Models ----------------

- name: OpenCLIP
  url: https://github.com/mlfoundations/open_clip
  description: Open-source reproduction of CLIP with many trained checkpoints (including SigLIP and EVA-CLIP variants).
  category: embedding-and-indexing-models
  github: mlfoundations/open_clip
  license: MIT
  sdks:
    - {language: Python (pip install open-clip-torch)}
  b2_integration: ""
  last_verified: 2026-04-17

- name: SigLIP 2
  url: https://huggingface.co/collections/google/siglip2-67b5dcef38c175486e240107
  docs_url: https://github.com/google-research/big_vision
  description: Google's sigmoid loss for contrastive image-text pretraining. SigLIP 2 adds multilingual and dense-caption training.
  category: embedding-and-indexing-models
  b2_integration: ""
  last_verified: 2026-04-17

- name: Nomic Embed
  url: https://www.nomic.ai/embed
  docs_url: https://docs.nomic.ai
  description: Open multimodal embedding family from Nomic. Nomic Embed Vision pairs with Nomic Embed Text for unified image/text search.
  category: embedding-and-indexing-models
  github: nomic-ai/contrastors
  b2_integration: ""
  last_verified: 2026-04-17

- name: BGE (BAAI General Embedding)
  url: https://github.com/FlagOpen/FlagEmbedding
  description: Family of multilingual text embeddings from BAAI. Top performers on MTEB; extended to visual and multimodal variants.
  category: embedding-and-indexing-models
  github: FlagOpen/FlagEmbedding
  license: MIT
  b2_integration: ""
  last_verified: 2026-04-17

- name: sentence-transformers
  url: https://www.sbert.net
  docs_url: https://github.com/UKPLab/sentence-transformers
  description: PyTorch framework for training and using dense embedding models. De-facto library for semantic search.
  category: embedding-and-indexing-models
  github: UKPLab/sentence-transformers
  license: Apache-2.0
  sdks:
    - {language: Python (pip install sentence-transformers)}
  b2_integration: ""
  last_verified: 2026-04-17

- name: FAISS
  url: https://github.com/facebookresearch/faiss
  docs_url: https://faiss.ai
  description: Meta's library for efficient similarity search of dense vectors. The reference ANN library for research-scale indexing.
  category: embedding-and-indexing-models
  github: facebookresearch/faiss
  license: MIT
  sdks:
    - {language: Python (pip install faiss-cpu)}
    - {language: C++}
  b2_integration: ""
  last_verified: 2026-04-17

- name: VLM2Vec
  url: https://github.com/TIGER-AI-Lab/VLM2Vec
  docs_url: https://tiger-ai-lab.github.io/VLM2Vec/
  description: Framework for training VLMs as dense embedding models. Ships MMEB-V2 benchmark with 78 tasks across images, videos, and visual documents.
  category: embedding-and-indexing-models
  github: TIGER-AI-Lab/VLM2Vec
  license: Apache-2.0
  sdks:
    - {language: Python}
  b2_integration: ""
  last_verified: 2026-04-18

